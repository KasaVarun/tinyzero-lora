model_name: "Qwen/Qwen2.5-1.5B-Instruct"

lora:
  r: 16
  lora_alpha: 64
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  lora_dropout: 0.05
  bias: "none"

training:
  learning_rate: 1e-4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  max_steps: 250  # Set to -1 for full epochs; 500 is ~1 hour on A100
  max_prompt_length: 512
  max_completion_length: 1024
  num_generations: 8
  temperature: 0.7
  save_steps: 25
  logging_steps: 10
